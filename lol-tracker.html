<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOL Tracker — Activity Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --bg2: #080d1a;
    --bg3: #0d1428;
    --panel: #0a1020;
    --border: #1a2540;
    --border2: #243050;
    --gold: #c8a84b;
    --gold2: #f0d060;
    --gold-dim: #7a6228;
    --blue: #0bc4e3;
    --blue2: #5de8ff;
    --blue-dim: #0a4a5a;
    --red: #e84040;
    --red2: #ff6060;
    --green: #40d080;
    --green2: #60ffaa;
    --purple: #9060e0;
    --text: #c8d4f0;
    --text2: #7a90b8;
    --text3: #3a4a6a;
    --heat0: #0d1428;
    --heat1: #0a2a4a;
    --heat2: #0a4a7a;
    --heat3: #0a70c0;
    --heat4: #0bc4e3;
    --heat5: #f0d060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(11,196,227,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(11,196,227,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(11,196,227,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(200,168,75,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,8,16,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-hex {
    width: 40px;
    height: 40px;
    position: relative;
  }

  .logo-hex svg {
    width: 100%;
    height: 100%;
  }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(200,168,75,0.5);
  }

  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-stats {
    display: flex;
    gap: 30px;
    align-items: center;
  }

  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-pill-val {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--blue);
  }

  .stat-pill-lbl {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 81px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
  }

  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ADD FRIEND FORM */
  .add-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(11,196,227,0.1);
  }

  input::placeholder { color: var(--text3); }

  select option { background: var(--bg3); }

  .btn-add {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: var(--bg);
    border: none;
    padding: 11px 16px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .btn-add::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }

  .btn-add:hover::before { transform: translateX(0); }
  .btn-add:hover { box-shadow: 0 4px 20px rgba(200,168,75,0.4); }

  /* FRIENDS LIST */
  .friends-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .friends-list::-webkit-scrollbar { width: 4px; }
  .friends-list::-webkit-scrollbar-track { background: transparent; }
  .friends-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .friend-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }

  .friend-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s;
  }

  .friend-card:hover {
    background: rgba(11,196,227,0.05);
    border-color: var(--border2);
  }

  .friend-card:hover::before { background: var(--blue); }

  .friend-card.active {
    background: rgba(11,196,227,0.08);
    border-color: var(--blue-dim);
  }

  .friend-card.active::before { background: var(--blue2); }

  .friend-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 900;
    transition: border-color 0.2s;
  }

  .friend-card.active .friend-avatar { border-color: var(--blue); }

  .friend-info { flex: 1; min-width: 0; }

  .friend-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .friend-server {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
  }

  .friend-status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-recent { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .status-inactive { background: var(--text3); }

  .friend-remove {
    opacity: 0;
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  .friend-card:hover .friend-remove { opacity: 1; }

  /* DASHBOARD */
  .dashboard {
    padding: 30px 40px;
    overflow-y: auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text3);
    text-align: center;
  }

  .empty-state .icon {
    font-size: 64px;
    opacity: 0.3;
    filter: grayscale(1);
  }

  .empty-state h2 {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--text3);
  }

  .empty-state p {
    font-size: 14px;
    max-width: 300px;
    line-height: 1.6;
  }

  /* PLAYER HEADER */
  .player-header {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 30px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .player-big-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 0 20px rgba(200,168,75,0.3);
  }

  .player-big-avatar::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(200,168,75,0.2);
  }

  .player-details { flex: 1; }

  .player-name {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(200,168,75,0.3);
  }

  .player-server-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--blue);
    border: 1px solid var(--blue-dim);
    padding: 2px 8px;
    margin-top: 6px;
  }

  .player-rank-row {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    align-items: center;
  }

  .rank-badge {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rank-icon {
    font-size: 24px;
  }

  .rank-info { }

  .rank-tier {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold2);
  }

  .rank-lp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }

  .player-meta-stats {
    display: flex;
    gap: 24px;
    margin-left: auto;
  }

  .meta-stat {
    text-align: center;
  }

  .meta-stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 600;
  }

  .meta-stat-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .win-color { color: var(--green); }
  .loss-color { color: var(--red); }
  .lp-gain { color: var(--green); }
  .lp-loss { color: var(--red); }

  /* GRID SECTION */
  .section {
    margin-bottom: 30px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text2);
    text-transform: uppercase;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border2), transparent);
  }

  /* HEATMAP / CALENDAR */
  .heatmap-container {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .heatmap-container::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 200px;
    background: radial-gradient(ellipse, rgba(11,196,227,0.03), transparent 70%);
    pointer-events: none;
  }

  .heatmap-months {
    display: flex;
    gap: 0;
    margin-bottom: 8px;
    padding-left: 32px;
  }

  .month-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    flex: 1;
    text-align: center;
  }

  .heatmap-body {
    display: flex;
    gap: 4px;
  }

  .heatmap-days-labels {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding-top: 2px;
  }

  .day-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 1px;
    text-align: right;
    padding-right: 6px;
    height: 14px;
    line-height: 14px;
    width: 26px;
  }

  .heatmap-grid {
    display: flex;
    gap: 3px;
    flex: 1;
  }

  .heatmap-week {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .heatmap-cell {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
  }

  .heatmap-cell:hover {
    transform: scale(1.3);
    z-index: 10;
  }

  .heatmap-cell[data-level="0"] { background: var(--heat0); border: 1px solid var(--border); }
  .heatmap-cell[data-level="1"] { background: var(--heat1); border: 1px solid #0a3060; }
  .heatmap-cell[data-level="2"] { background: var(--heat2); border: 1px solid #0a5090; }
  .heatmap-cell[data-level="3"] { background: var(--heat3); border: 1px solid #0a80d0; }
  .heatmap-cell[data-level="4"] { background: var(--heat4); box-shadow: 0 0 6px rgba(11,196,227,0.5); border: 1px solid var(--blue2); }
  .heatmap-cell[data-level="5"] { background: var(--heat5); box-shadow: 0 0 8px rgba(240,208,96,0.6); border: 1px solid var(--gold2); }

  .heatmap-cell.today {
    box-shadow: 0 0 0 2px var(--gold), 0 0 10px rgba(200,168,75,0.4) !important;
  }

  /* TOOLTIP */
  .tooltip {
    position: fixed;
    background: var(--bg3);
    border: 1px solid var(--border2);
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 1000;
    display: none;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .tooltip.show { display: block; }

  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    justify-content: flex-end;
  }

  .legend-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
  }

  .legend-cells {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .legend-cell {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }

  /* LP CHART */
  .lp-chart-container {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
  }

  .lp-chart-info {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .lp-delta {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
  }

  .lp-delta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .lp-breakdown {
    display: flex;
    gap: 20px;
    text-align: right;
  }

  .lp-part {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .lp-part-val {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 600;
  }

  .lp-part-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 2px;
  }

  canvas#lpChart {
    width: 100%;
    height: 120px;
  }

  /* RECENT MATCHES */
  .matches-container {
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .match-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .match-row:last-child { border-bottom: none; }
  .match-row:hover { background: rgba(255,255,255,0.02); }

  .match-row::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
  }

  .match-row.win::before { background: var(--green); }
  .match-row.loss::before { background: var(--red); }

  .match-result-badge {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 4px 10px;
    width: 60px;
    text-align: center;
    flex-shrink: 0;
  }

  .match-row.win .match-result-badge {
    color: var(--green2);
    background: rgba(64,208,128,0.1);
    border: 1px solid rgba(64,208,128,0.3);
  }

  .match-row.loss .match-result-badge {
    color: var(--red2);
    background: rgba(232,64,64,0.1);
    border: 1px solid rgba(232,64,64,0.3);
  }

  .match-champ {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    flex-shrink: 0;
  }

  .match-info { flex: 1; }

  .match-champ-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .match-mode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .match-kda {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    flex-shrink: 0;
    width: 80px;
  }

  .match-kda span.deaths { color: var(--red2); }

  .match-lp {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 600;
    width: 70px;
    text-align: right;
    flex-shrink: 0;
  }

  .match-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  /* LP MINI BAR */
  .lp-bar-container {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .lp-bar-track {
    flex: 1;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    max-width: 100px;
  }

  .lp-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .lp-bar-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* API NOTE */
  .api-note {
    background: rgba(200,168,75,0.05);
    border: 1px solid rgba(200,168,75,0.2);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .api-note-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  .api-note-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    line-height: 1.6;
    letter-spacing: 0.5px;
  }

  .api-note-text strong { color: var(--gold2); }

  /* ANIMATIONS */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .animate-in {
    animation: fadeInUp 0.4s ease forwards;
  }

  .loading-pulse {
    animation: pulse 1.5s ease infinite;
  }

  /* SCROLLBAR */
  .dashboard::-webkit-scrollbar { width: 4px; }
  .dashboard::-webkit-scrollbar-track { background: transparent; }

</style>
</head>

<div class="tooltip" id="tooltip"></div>

<script>
// ──────────────────────────────────────────────
// CONFIG — URL del backend local
// ──────────────────────────────────────────────
const API_BASE = 'https://loltracker-backend.up.railway.app'; // ← cambiá por tu URL de Railway

// Cache para no repetir llamadas
const dataCache = {};

// Mapeo de campeones a emojis
const CHAMP_ICONS = {
  Jinx:'🎯',Lux:'✨',Yasuo:'🌪️',Zed:'🌑',Ahri:'🦊',Thresh:'⛓️',
  Ezreal:'🌀',Caitlyn:'🎯',Katarina:'🗡️',Garen:'⚔️',Ashe:'🏹',
  Darius:'🪓',Vayne:'🏹',LeeSin:'👊',Akali:'🌸',Jinx:'🎯',
  Jhin:'🎭',Syndra:'🌑',Viktor:'🤖',Orianna:'⚽',Sett:'👊',
  Graves:'🔫',Twisted_Fate:'🃏',MissFortune:'💀',Nautilus:'⚓',
  Blitzcrank:'🤖',Morgana:'🖤',Kaisa:'💜',Samira:'⚔️',Vex:'😈',
};

function champIcon(name) {
  return CHAMP_ICONS[name.replace(/\s/g, '')] || '⚔️';
}

const QUEUE_NAMES = {
  420: 'Ranked Solo/Duo',
  440: 'Ranked Flex',
  430: 'Normal Draft',
  450: 'ARAM',
  900: 'URF',
  1020: 'One for All',
  700: 'Clash',
};

const RANK_ICONS = {
  IRON:'⚙️', BRONZE:'🪙', SILVER:'🥈', GOLD:'🥇',
  PLATINUM:'💎', EMERALD:'💚', DIAMOND:'💠',
  MASTER:'👑', GRANDMASTER:'🏆', CHALLENGER:'⚡',
};

const RANK_COLORS = {
  IRON:'#8B7355', BRONZE:'#CD7F32', SILVER:'#C0C0C0', GOLD:'#FFD700',
  PLATINUM:'#4FC3F7', EMERALD:'#50C878', DIAMOND:'#9C27B0',
  MASTER:'#FF6B35', GRANDMASTER:'#FF1744', CHALLENGER:'#FFD600',
};

// ──────────────────────────────────────────────
// FETCH DE DATOS REALES
// ──────────────────────────────────────────────
async function fetchPlayerData(name, server) {
  const cacheKey = `${name}-${server}`;
  if (dataCache[cacheKey]) return dataCache[cacheKey];

  // 0. Obtener versión de ddragon para íconos
  let ddVersion = '14.10.1';
  try {
    const vr = await fetch(`${API_BASE}/api/ddragon/version`);
    const vd = await vr.json();
    ddVersion = vd.version || ddVersion;
  } catch(e) {}
  const DD = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}`;

  // 1. Summoner + ranked
  const summonerRes = await fetch(`${API_BASE}/api/summoner/${server}/${encodeURIComponent(name)}`);
  if (!summonerRes.ok) {
    const err = await summonerRes.json();
    throw new Error(err.error || `Error ${summonerRes.status}`);
  }
  const summonerData = await summonerRes.json();
  const { summoner, soloQ } = summonerData;

  // 2. Actividad (heatmap)
  const activityRes = await fetch(`${API_BASE}/api/activity/${server}/${summoner.puuid}`);
  const activityData = await activityRes.json();

  // 3. Últimas 5 partidas para el panel
  const matchRes = await fetch(`${API_BASE}/api/matches/${server}/${summoner.puuid}?count=20`);
  const matchData = await matchRes.json();

  // Procesar rango
  const tier = soloQ ? soloQ.tier : 'UNRANKED';
  const division = soloQ ? soloQ.rank : '';
  const currentLP = soloQ ? soloQ.leaguePoints : 0;
  const wins = soloQ ? soloQ.wins : 0;
  const losses = soloQ ? soloQ.losses : 0;

  const rank = {
    tier: tier === 'UNRANKED' ? 'Sin Clasificar' : `${tier} ${division}`,
    icon: RANK_ICONS[tier] || '❓',
    color: RANK_COLORS[tier] || '#7a90b8',
  };

  // Procesar últimas 20 partidas
  const recentMatches = (matchData.matches || []).slice(0, 20).map(match => {
    const p = match.info.participants.find(p => p.puuid === summoner.puuid);
    if (!p) return null;
    const startTs = match.info.gameStartTimestamp;
    const minsAgo = Math.floor((Date.now() - startTs) / 60000);
    const duration = Math.floor(match.info.gameDuration / 60);
    // LP change: Riot no expone LP en match v5; estimamos por posición
    const lpEst = p.win ? (p.champLevel >= 10 ? 20 : 17) : -(p.champLevel >= 10 ? 16 : 13);
    return {
      win: p.win,
      champion: p.championName,
      icon: champIcon(p.championName),
      kills: p.kills, deaths: p.deaths, assists: p.assists,
      lpChange: (match.info.queueId === 420 || match.info.queueId === 440) ? lpEst : null,
      minsAgo,
      duration,
      mode: QUEUE_NAMES[match.info.queueId] || 'Partida',
    };
  }).filter(Boolean);

  // Construir activityData array para el heatmap (último mes)
  const actMap = activityData.activityMap || {};
  const heatmapData = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const day = actMap[dateStr] || { games: 0, wins: 0, losses: 0 };
    heatmapData.push({ date: dateStr, games: day.games, active: day.games > 0 });
  }

  // LP acumulado real desde las 20 partidas ranked (más preciso)
  // Construimos la curva de LP partido a partido (orden cronológico)
  const rankedOnly = recentMatches.filter(m => m.lpChange !== null).reverse(); // cronológico
  let lpRunning = currentLP;
  // Reconstruir hacia atrás desde el LP actual
  const lpCurve = [];
  let acc = currentLP;
  for (let i = rankedOnly.length - 1; i >= 0; i--) {
    lpCurve.unshift({ date: '', lp: Math.max(0, Math.min(100, acc)) });
    acc -= rankedOnly[i].lpChange; // restar hacia atrás
  }
  lpCurve.push({ date: 'Ahora', lp: currentLP });

  // Para el gráfico de 10 días agrupamos por día
  const last10Map = {};
  (activityData.last10Days || []).forEach(d => { last10Map[d.date] = d; });
  let lpAccum = currentLP;
  const last10 = [];
  const today10 = new Date();
  for (let i = 9; i >= 0; i--) {
    const d = new Date(today10);
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    last10.push({ date: dateStr, lp: Math.max(0, Math.min(100, lpAccum)) });
  }
  // Llenar con curva real si hay datos suficientes
  const last10Final = lpCurve.length >= 2 ? lpCurve.slice(-10) : last10;

  const lpGained = rankedOnly.filter(m => m.win).reduce((s, m) => s + m.lpChange, 0);
  const lpLost   = rankedOnly.filter(m => !m.win).reduce((s, m) => s + m.lpChange, 0);
  const netLP    = lpGained + lpLost;

  const masteryTop = summonerData.masteryTop || [];

  const result = {
    rank,
    currentLP,
    wins,
    losses,
    activityData: heatmapData,
    lpHistory: last10Final.length >= 2 ? last10Final : Array.from({length:10}, (_,i) => ({ date: '', lp: 50 + i*3 })),
    recentMatches,
    lpGained,
    lpLost,
    netLP,
    masteryTop,
    profileIconId: summoner.profileIconId,
    summonerLevel: summoner.summonerLevel,
    ddVersion,
    DD,
  };

  dataCache[cacheKey] = result;
  return result;
}

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let friends = JSON.parse(localStorage.getItem('lol_friends') || '[]');
let activeFriend = null;

function saveFriends() {
  localStorage.setItem('lol_friends', JSON.stringify(friends));
}

// ──────────────────────────────────────────────
// ADD FRIEND
// ──────────────────────────────────────────────
function addFriend() {
  const name = document.getElementById('summonerInput').value.trim();
  const server = document.getElementById('serverSelect').value;
  if (!name) {
    document.getElementById('summonerInput').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('summonerInput').style.borderColor = '', 1000);
    return;
  }
  if (friends.find(f => f.name.toLowerCase() === name.toLowerCase() && f.server === server)) {
    alert(`${name} (${server}) ya está en tu lista.`);
    return;
  }
  const friend = { id: Date.now(), name, server, addedAt: new Date().toISOString() };
  friends.unshift(friend);
  saveFriends();
  document.getElementById('summonerInput').value = '';
  renderFriendsList();
  updateHeaderStats();
  selectFriend(friend);
}

// ──────────────────────────────────────────────
// REMOVE FRIEND
// ──────────────────────────────────────────────
function removeFriend(id, e) {
  e.stopPropagation();
  friends = friends.filter(f => f.id !== id);
  saveFriends();
  if (activeFriend && activeFriend.id === id) {
    activeFriend = null;
    document.getElementById('playerView').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
  }
  renderFriendsList();
  updateHeaderStats();
}

// ──────────────────────────────────────────────
// FRIENDS LIST RENDER
// ──────────────────────────────────────────────
function getAvatarColor(name) {
  const hues = [200, 160, 280, 30, 330, 60, 190];
  const h = hues[name.charCodeAt(0) % hues.length];
  return `hsl(${h}, 50%, 20%)`;
}

function getTextColor(name) {
  const hues = [200, 160, 280, 30, 330, 60, 190];
  const h = hues[name.charCodeAt(0) % hues.length];
  return `hsl(${h}, 80%, 65%)`;
}

function renderFriendsList() {
  const container = document.getElementById('friendsList');
  if (!friends.length) {
    container.innerHTML = `<div style="padding:20px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);line-height:2;">Sin invocadores<br>en tu lista.</div>`;
    return;
  }
  container.innerHTML = friends.map(f => {
    const cached = dataCache[`${f.name}-${f.server}`];
    const todayStr = new Date().toISOString().split("T")[0];
    const today = cached && cached.activityData.find(d => d.date === todayStr);
    const statusClass = today && today.active ? "status-active" : (cached ? "status-recent" : "status-inactive");
    const isActive = activeFriend && activeFriend.id === f.id;
    return `
    <div class="friend-card ${isActive ? 'active' : ''}" onclick="selectFriend(${JSON.stringify(f).replace(/"/g, '&quot;')})">
      <div class="friend-avatar" style="background:${getAvatarColor(f.name)};color:${getTextColor(f.name)};padding:0;overflow:hidden">
        ${(() => { const c = dataCache[f.name+'-'+f.server]; const dd = c && c.DD; const icon = c && c.profileIconId; return (dd && icon) ? `<img src="${dd}/img/profileicon/${icon}.png" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>` : f.name[0].toUpperCase(); })()}
      </div>
      <div class="friend-info">
        <div class="friend-name">${f.name}</div>
        <div class="friend-server">${f.server}</div>
      </div>
      <div class="friend-status ${statusClass}"></div>
      <button class="friend-remove" onclick="removeFriend(${f.id}, event)" title="Eliminar">×</button>
    </div>`;
  }).join('');
}

// ──────────────────────────────────────────────
// SELECT FRIEND → RENDER DASHBOARD (async)
// ──────────────────────────────────────────────
async function selectFriend(friend) {
  activeFriend = friend;
  renderFriendsList();
  document.getElementById('emptyState').style.display = 'none';
  const view = document.getElementById('playerView');
  view.style.display = 'block';

  // Loading state
  view.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;">
      <div style="font-family:'Orbitron',monospace;font-size:13px;color:var(--blue);letter-spacing:3px;" class="loading-pulse">
        CARGANDO DATOS...
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);">
        Consultando API de Riot Games para <strong style="color:var(--text2)">${friend.name}</strong> (${friend.server})
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);max-width:340px;text-align:center;line-height:1.8;">
        El historial completo puede tardar <span style="color:var(--gold)">10-30 segundos</span><br>
        mientras se respetan los límites de la API de Riot.
      </div>
    </div>`;

  try {
    const data = await fetchPlayerData(friend.name, friend.server);
    view.innerHTML = buildPlayerView(friend, data);
    view.querySelectorAll('.animate-in').forEach((el, i) => {
      el.style.animationDelay = `${i * 0.06}s`;
      el.style.opacity = '0';
    });
    buildHeatmap(data.activityData, friend.name);
    buildLPChart(data.lpHistory);
    setupTooltips();
  } catch (err) {
    view.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:14px;text-align:center;">
        <div style="font-size:48px;">⚠️</div>
        <div style="font-family:'Orbitron',monospace;font-size:14px;color:var(--red);letter-spacing:2px;">ERROR AL CARGAR</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);max-width:400px;line-height:1.7;">
          ${err.message}<br><br>
          Verificá que el backend esté corriendo:<br>
          <span style="color:var(--blue)">node server.js</span>
          <br><br>
          Y que el invocador <strong style="color:var(--text2)">${friend.name}</strong> exista en el servidor <strong style="color:var(--text2)">${friend.server}</strong>.
        </div>
      </div>`;
  }
}

function buildMasteryCards(data) {
  if (!data.masteryTop || !data.masteryTop.length) {
    return '<div style="color:var(--text3);font-family:JetBrains Mono,monospace;font-size:12px">Sin datos de maestría</div>';
  }
  return data.masteryTop.map(function(m, i) {
    const champKey = m.championName || String(m.championId);
    const pts = m.masteryPoints >= 1000000 ? (m.masteryPoints/1000000).toFixed(1)+'M'
              : m.masteryPoints >= 1000 ? (m.masteryPoints/1000).toFixed(0)+'K'
              : String(m.masteryPoints);
    const imgSrc = data.DD + '/img/champion/' + champKey + '.png';
    return '<div style="background:var(--panel);border:1px solid var(--border2);padding:14px 18px;display:flex;align-items:center;gap:12px;flex:1">'
      + '<div style="position:relative;flex-shrink:0">'
      + '<img src="' + imgSrc + '" style="width:48px;height:48px;border-radius:50%;border:2px solid var(--border2)"/>'
      + '<div style="position:absolute;bottom:-4px;right:-4px;background:var(--gold);color:var(--bg);font-family:Orbitron,monospace;font-size:9px;font-weight:900;padding:1px 4px;border-radius:2px">' + (i+1) + '</div>'
      + '</div>'
      + '<div>'
      + '<div style="font-size:14px;font-weight:600;color:var(--text)">' + champKey + '</div>'
      + '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--gold)">Nivel ' + m.masteryLevel + '</div>'
      + '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--text3)">' + pts + ' pts</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function buildPlayerView(friend, data) {
  const todayStr = new Date().toISOString().split('T')[0];
  const todayData = data.activityData.find(d => d.date === todayStr);
  const totalGames = data.activityData.reduce((s, d) => s + d.games, 0);
  const todayGames = todayData ? todayData.games : 0;

  const netColor = data.netLP >= 0 ? 'var(--green)' : 'var(--red)';
  const netPrefix = data.netLP >= 0 ? '+' : '';

  const DD = data.DD || 'https://ddragon.leagueoflegends.com/cdn/14.10.1';
  const matchesHTML = data.recentMatches.map(m => {
    const lpColor = m.win ? 'var(--green)' : 'var(--red)';
    const lpPrefix = m.win ? '+' : '';
    const hours = Math.floor(m.minsAgo / 60);
    const mins = m.minsAgo % 60;
    const timeStr = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
    return `
    <div class="match-row ${m.win ? 'win' : 'loss'}">
      <div class="match-result-badge">${m.win ? 'WIN' : 'LOSS'}</div>
      <div class="match-champ" style="padding:0;overflow:hidden">
        <img src="\${data.DD}/img/champion/\${m.champion}.png"
             style="width:38px;height:38px;object-fit:cover"
             onerror="this.style.display='none';this.parentNode.textContent='\${m.icon}'"/>
      </div>
      <div class="match-info">
        <div class="match-champ-name">${m.champion}</div>
        <div class="match-mode">${m.mode} · ${m.duration}min</div>
      </div>
      <div class="match-kda">${m.kills}/<span class="deaths">${m.deaths}</span>/${m.assists}</div>
      <div class="match-lp" style="color:${lpColor}">${lpPrefix}${m.lpChange} LP</div>
      <div class="match-time">${timeStr} atrás</div>
    </div>`;
  }).join('');

  // LP bar
  const lpPct = data.currentLP;
  const lpBarColor = 'var(--gold)';

  return `
  <div class="player-header animate-in">
    <div class="player-big-avatar" style="padding:0;overflow:hidden;background:${getAvatarColor(friend.name)}">
      <img src="${data.DD}/img/profileicon/${data.profileIconId}.png"
           style="width:100%;height:100%;object-fit:cover;"
           onerror="this.style.display='none';this.parentNode.textContent='${friend.name[0].toUpperCase()}'"/>
    </div>
    <div class="player-details">
      <div class="player-name">${friend.name}</div>
      <span class="player-server-badge">${friend.server}</span>
      <span class="player-server-badge" style="margin-left:6px;border-color:var(--gold-dim);color:var(--gold)">
        Nv. ${data.summonerLevel}
      </span>
      <div class="player-rank-row">
        <div class="rank-badge">
          <span class="rank-icon">${data.rank.icon}</span>
          <div class="rank-info">
            <div class="rank-tier" style="color:${data.rank.color}">${data.rank.tier}</div>
            <div class="rank-lp">${data.currentLP} LP
              <span style="color:var(--text3)">· Próximo ${100 - data.currentLP} LP</span>
            </div>
          </div>
        </div>
        <div class="lp-bar-container" style="max-width:160px;flex:1">
          <div class="lp-bar-track" style="max-width:unset;flex:1">
            <div class="lp-bar-fill" style="width:${lpPct}%;background:${lpBarColor}"></div>
          </div>
          <span class="lp-bar-text">${lpPct}/100</span>
        </div>
      </div>
    </div>
    <div class="player-meta-stats">
      <div class="meta-stat">
        <div class="meta-stat-val" style="color:var(--blue)">${todayGames}</div>
        <div class="meta-stat-lbl">Hoy</div>
      </div>
      <div class="meta-stat">
        <div class="meta-stat-val" style="color:var(--text)">${totalGames}</div>
        <div class="meta-stat-lbl">Total</div>
      </div>
      <div class="meta-stat">
        <div class="meta-stat-val" style="color:${netColor}">${netPrefix}${data.netLP}</div>
        <div class="meta-stat-lbl">LP 10d</div>
      </div>
    </div>
  </div>

  <div class="section animate-in">
    <div class="section-header">
      <span class="section-title">Actividad Diaria — Último Mes</span>
      <div class="section-line"></div>
    </div>
    <div class="heatmap-container">
      <div class="heatmap-months" id="heatmapMonths"></div>
      <div class="heatmap-body">
        <div class="heatmap-days-labels">
          <div class="day-label">LUN</div>

// ──────────────────────────────────────────────
// HEATMAP
// ──────────────────────────────────────────────
function buildHeatmap(activityData, name) {
  const grid = document.getElementById('heatmapGrid');
  const monthsEl = document.getElementById('heatmapMonths');
  if (!grid) return;

  const todayStr = new Date().toISOString().split('T')[0];

  // Build week columns
  const today = new Date();
  const weeks = [];
  let week = [];
  const startDay = new Date(today);
  startDay.setDate(startDay.getDate() - 29);
  // Align to Monday
  while (startDay.getDay() !== 1) startDay.setDate(startDay.getDate() - 1);

  const actMap = {};
  activityData.forEach(d => actMap[d.date] = d);

  const monthPositions = {};
  let cellIdx = 0;
  const cursor = new Date(startDay);

  while (cursor <= today || week.length > 0) {
    const dStr = cursor.toISOString().split('T')[0];
    const act = actMap[dStr] || { games: 0, active: false };
    const g = act.games;
    let level = 0;
    if (g >= 1) level = 1;
    if (g >= 2) level = 2;
    if (g >= 4) level = 3;
    if (g >= 6) level = 4;
    if (g >= 8) level = 5;

    const monthKey = `${cursor.getFullYear()}-${cursor.getMonth()}`;
    if (!monthPositions[monthKey]) monthPositions[monthKey] = { idx: weeks.length, label: cursor.toLocaleString('es', { month: 'short' }) };

    week.push({ date: dStr, games: g, level, isToday: dStr === todayStr });
    cellIdx++;

    if (cursor.getDay() === 0 || cursor > today) {
      // Pad if needed
      while (week.length < 7) week.push({ date: '', games: 0, level: -1 });
      weeks.push([...week]);
      week = [];
    }
    cursor.setDate(cursor.getDate() + 1);
    if (cursor > today && week.length === 0) break;
  }

  grid.innerHTML = '';
  weeks.forEach(wk => {
    const col = document.createElement('div');
    col.className = 'heatmap-week';
    wk.forEach(day => {
      const cell = document.createElement('div');
      if (day.level === -1) {
        cell.className = 'heatmap-cell';
        cell.style.visibility = 'hidden';
      } else {
        cell.className = 'heatmap-cell' + (day.isToday ? ' today' : '');
        cell.setAttribute('data-level', day.level);
        cell.setAttribute('data-date', day.date);
        cell.setAttribute('data-games', day.games);
      }
      col.appendChild(cell);
    });
    grid.appendChild(col);
  });

  // Months header
  monthsEl.innerHTML = '';
  const shownMonths = {};
  weeks.forEach((wk, i) => {
    const dStr = wk[0] && wk[0].date;
    if (!dStr) return;
    const d = new Date(dStr);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!shownMonths[key]) {
      shownMonths[key] = true;
      const lbl = document.createElement('div');
      lbl.className = 'month-label';
      lbl.textContent = d.toLocaleString('es', { month: 'short' }).toUpperCase();
      monthsEl.appendChild(lbl);
    }
  });
}

// ──────────────────────────────────────────────
// LP CHART (canvas)
// ──────────────────────────────────────────────
function buildLPChart(lpHistory) {
  const canvas = document.getElementById('lpChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth || 400;
  const h = 120;
  canvas.width = w;
  canvas.height = h;

  const values = lpHistory.map(d => d.lp);
  const labels = lpHistory.map(d => {
    const dt = new Date(d.date);
    return `${dt.getDate()}/${dt.getMonth()+1}`;
  });

  const min = Math.max(0, Math.min(...values) - 10);
  const max = Math.min(100, Math.max(...values) + 10);
  const range = max - min || 1;

  const pad = { top: 10, right: 10, bottom: 30, left: 30 };
  const chartW = w - pad.left - pad.right;
  const chartH = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = 'rgba(26,37,64,0.8)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (chartH * i / 4);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + chartW, y);
    ctx.stroke();
    ctx.fillStyle = 'rgba(58,74,106,0.8)';
    ctx.font = '8px JetBrains Mono';
    ctx.fillText(Math.round(max - (range * i / 4)), 0, y + 3);
  }

  // Points
  const pts = values.map((v, i) => ({
    x: pad.left + (chartW * i / (values.length - 1)),
    y: pad.top + chartH - ((v - min) / range * chartH),
  }));

  // Fill
  const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
  gradient.addColorStop(0, 'rgba(11,196,227,0.2)');
  gradient.addColorStop(1, 'rgba(11,196,227,0.0)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pad.top + chartH);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, pad.top + chartH);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#0bc4e3';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // Dots
  pts.forEach((p, i) => {
    const isLast = i === pts.length - 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, isLast ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = isLast ? '#f0d060' : '#0bc4e3';
    ctx.fill();
    if (isLast) {
      ctx.strokeStyle = 'rgba(240,208,96,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  // Labels
  ctx.fillStyle = 'rgba(58,74,106,0.9)';
  ctx.font = '8px JetBrains Mono';
  ctx.textAlign = 'center';
  pts.forEach((p, i) => {
    if (i % 2 === 0 || i === pts.length - 1) {
      ctx.fillText(labels[i], p.x, h - 8);
    }
  });
}

// ──────────────────────────────────────────────
// TOOLTIPS
// ──────────────────────────────────────────────
function setupTooltips() {
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('.heatmap-cell[data-date]').forEach(cell => {
    cell.addEventListener('mouseenter', e => {
      const date = cell.getAttribute('data-date');
      const games = parseInt(cell.getAttribute('data-games'));
      const d = new Date(date);
      const label = d.toLocaleDateString('es', { weekday: 'long', day: 'numeric', month: 'long' });
      tooltip.textContent = games > 0 ? `${label}: ${games} partida${games !== 1 ? 's' : ''}` : `${label}: sin actividad`;
      tooltip.classList.add('show');
    });
    cell.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 30) + 'px';
    });
    cell.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  });
}

// ──────────────────────────────────────────────
// HEADER STATS
// ──────────────────────────────────────────────
function updateHeaderStats() {
  document.getElementById('hdr-friends').textContent = friends.length;
  const todayStr = new Date().toISOString().split('T')[0];
  let activeToday = 0, gamesToday = 0;
  friends.forEach(f => {
    const cached = dataCache[f.name + '-' + f.server];
    const today = cached && cached.activityData.find(function(d) { return d.date === todayStr; });
    if (today && today.active) { activeToday++; gamesToday += today.games; }
  });
  document.getElementById('hdr-active').textContent = activeToday;
  document.getElementById('hdr-games').textContent = gamesToday;
}
